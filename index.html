<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageShotGo | Instant Full-Page Capture</title>
    <style>
        :root {
            --primary-color: #3498db;
            --text-color: #2c3e50;
            --bg-color: #ffffff;
            --light-gray: #f9f9f9;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        header {
            margin-bottom: 2rem;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 2.5rem;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.2);
        }

        .cta-button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 4rem;
            border-top: 1px solid #eee;
            padding-top: 2rem;
        }

        .feature-item h3 {
            font-size: 1rem;
            margin-bottom: 0.2rem;
        }

        .feature-item p {
            font-size: 0.85rem;
            color: #95a5a6;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="icon.png" alt="PageShotGo Logo" class="logo">
            <h1>PageShotGo</h1>
            <p class="subtitle">One click. Full page. Done.</p>
        </header>

        <main>
            <a href="#" class="cta-button">Add to Chrome — It's Free</a>

            <section class="features">
                <div class="feature-item">
                    <h3>Auto-Scroll</h3>
                    <p>Captures everything from top to bottom.</p>
                </div>
                <div class="feature-item">
                    <h3>High Quality</h3>
                    <p>Crystal clear PNG or PDF formats.</p>
                </div>
                <div class="feature-item">
                    <h3>Zero Setup</h3>
                    <p>No account needed. Just click and go.</p>
                </div>
            </section>
        </main>

        <footer>
            &copy; 2026 PageShotGo. Simple & Reliable.
        </footer>
    </div>

</body>
</html>
